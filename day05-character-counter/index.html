<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウンター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>文字数カウンター</h1>

    <textarea id="textInput" placeholder="文章を入力してください"></textarea>

    <p>文字数：<span id="charCount">0</span></p>
    <p>空白なし文字数：<span id="charCountNoSpace">0</span></p>
    <p>X残り文字数：<span id="remainingCount">280</span></p>

    <script src="script.js"></script>
</body>
</html>
